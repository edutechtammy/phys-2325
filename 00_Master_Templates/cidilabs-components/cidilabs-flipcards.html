<!-- CidiLabs Flip Cards:  CidiLabs DesignPLUS Flip Cards are interactive, accessible, and customizable digital flashcards designed to enhance engagement and active recall within the Canvas Learning Management System. They allow instructors to create "purposeful pauses" in learning by displaying content (text or images) that flips over when a student clicks on it. 
Key Features and Benefits
-- Interactivity: Designed to improve long-term memory through active recall.
-- Accessibility: Fully accessible to all users, including keyboard navigation support (space bar/enter key).
-- Customization: Supports text, images, and can be configured for various uses like vocabulary,, concepts, or flashcards.
-- DesignPLUS Integration: Part of the Design Tools for Canvas, allowing for easy creation without needing to know HTML.
-- Visual Organization: Enables instructors to organize content in a compact, engaging format. 
Usage in Canvas
Functionality: Students can click on the cards to reveal the back side.
Formatting: Cards can be set to equal height for consistent, polished presentation.
Placement: Can be added to pages, assignments, or discussions within Canvas.   

The base flip cards template has been adapted so that 
-- the code gives a row of three of them which has been the typical need. If you need to split out to singles just examine the code and break one out from the row and column portions of the code.
-- The front of the cards has an added icon (question mark) to indicate interactivity and it is using the TSTC brand color, Texas Blue.
-->
